<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>小狗图片</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        background: #f7efe4;
        color: #33261f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at 20% 20%, #fff8ef 0 18%, transparent 19%),
          linear-gradient(135deg, #f7efe4, #e9f2ef);
      }

      main {
        width: min(92vw, 720px);
        text-align: center;
      }

      img {
        display: block;
        width: min(100%, 520px);
        height: auto;
        margin: 0 auto;
        border-radius: 8px;
        box-shadow: 0 22px 60px rgba(90, 63, 42, .18);
      }
    </style>
  </head>
  <body>
    <main>
      <img src="assets/dog.svg" alt="一只简单可爱的小狗插画">
    </main>
  </body>
</html>
