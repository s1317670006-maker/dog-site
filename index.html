<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>小狗疗愈站</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        background: #f6efe8;
        color: #3b2a24;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 12% 18%, rgba(255, 219, 204, .9) 0 12%, transparent 13%),
          radial-gradient(circle at 86% 15%, rgba(216, 236, 226, .95) 0 14%, transparent 15%),
          radial-gradient(circle at 78% 84%, rgba(255, 232, 191, .75) 0 17%, transparent 18%),
          linear-gradient(140deg, #fff8f0 0%, #f2eadf 48%, #e9f2ed 100%);
      }

      body::before {
        position: fixed;
        inset: 0;
        pointer-events: none;
        content: "";
        background-image:
          linear-gradient(rgba(255, 255, 255, .24) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, .2) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, .38), transparent 72%);
      }

      .corner-button {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 10;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border: 0;
        border-radius: 8px;
        background: #6f5346;
        color: #fffaf3;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
        box-shadow: 0 14px 32px rgba(91, 65, 54, .2);
      }

      .corner-button:hover {
        background: #8c6758;
      }

      main {
        position: relative;
        z-index: 1;
        width: min(92vw, 860px);
        min-height: 100vh;
        margin: 0 auto;
        display: grid;
        place-items: center;
        padding: 92px 0 56px;
        text-align: center;
      }

      .intro {
        position: relative;
        max-width: 640px;
      }

      .eyebrow {
        margin: 0 0 14px;
        color: #7c675b;
        font-size: 15px;
        line-height: 1.7;
      }

      h1 {
        margin: 0;
        color: #3b2a24;
        font-size: clamp(36px, 8vw, 70px);
        line-height: 1.08;
        font-weight: 800;
      }

      .copy {
        margin: 22px 0 0;
        max-width: 560px;
        color: #69574d;
        font-size: 18px;
        line-height: 1.85;
      }

      .quiet-note {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        margin-top: 28px;
        padding: 0 14px;
        border: 1px solid rgba(117, 91, 76, .18);
        border-radius: 8px;
        background: rgba(255, 250, 243, .58);
        color: #725d50;
        font-size: 14px;
        backdrop-filter: blur(8px);
      }

      .breath {
        position: relative;
        width: min(68vw, 280px);
        aspect-ratio: 1;
        margin: 42px auto 0;
        border-radius: 50%;
        background:
          radial-gradient(circle, rgba(255, 250, 243, .98) 0 34%, rgba(255, 224, 211, .55) 35% 58%, rgba(221, 239, 231, .36) 59% 100%);
        box-shadow:
          inset 0 0 42px rgba(255, 255, 255, .74),
          0 30px 86px rgba(99, 70, 58, .16);
      }

      .breath::before,
      .breath::after {
        position: absolute;
        content: "";
        border-radius: 50%;
        background: rgba(255, 255, 255, .5);
      }

      .breath::before {
        width: 38%;
        aspect-ratio: 1;
        top: 18%;
        left: 18%;
      }

      .breath::after {
        width: 22%;
        aspect-ratio: 1;
        right: 21%;
        bottom: 24%;
      }

      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
          padding-top: 96px;
        }

        .intro,
        .copy {
          margin-left: auto;
          margin-right: auto;
        }
      }
    </style>
  </head>
  <body>
    <a class="corner-button" href="heart.html" target="_blank" rel="noopener">敢不敢点我</a>
    <main>
      <section class="intro" aria-label="疗愈文字">
        <p class="eyebrow">欢迎来到今天的小小休息处</p>
        <h1>把心放软一点。</h1>
        <p class="copy">这里没有需要立刻完成的事。慢慢呼吸，把肩膀放下来，给自己一点温柔的时间。</p>
        <p class="quiet-note">今天也已经很努力了</p>
        <div class="breath" aria-hidden="true"></div>
      </section>
    </main>
  </body>
</html>
