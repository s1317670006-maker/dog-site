<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>小狗图片</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        background: #f7efe4;
        color: #33261f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at 20% 20%, #fff8ef 0 18%, transparent 19%),
          linear-gradient(135deg, #f7efe4, #e9f2ef);
      }

      .corner-button {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 10;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border: 0;
        border-radius: 8px;
        background: #33261f;
        color: #fff8ef;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
        box-shadow: 0 12px 28px rgba(51, 38, 31, .18);
      }

      .corner-button:hover {
        background: #5a3f2a;
      }

      main {
        width: min(92vw, 720px);
        text-align: center;
      }

      img {
        display: block;
        width: min(100%, 520px);
        height: auto;
        margin: 0 auto;
        border-radius: 8px;
        box-shadow: 0 22px 60px rgba(90, 63, 42, .18);
      }
    </style>
  </head>
  <body>
    <a class="corner-button" href="heart.html" target="_blank" rel="noopener">敢不敢点我</a>
    <main>
      <img src="assets/dog.svg" alt="一只简单可爱的小狗插画">
    </main>
  </body>
</html>
