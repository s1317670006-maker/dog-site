<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>小狗比心</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        background: #fff4ee;
        color: #3a2620;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at 80% 20%, rgba(255, 214, 226, .9) 0 14%, transparent 15%),
          radial-gradient(circle at 18% 82%, rgba(221, 242, 231, .9) 0 18%, transparent 19%),
          linear-gradient(145deg, #fff8f1, #f3ece1);
      }

      main {
        width: min(92vw, 760px);
        text-align: center;
      }

      h1 {
        margin: 0 0 24px;
        color: #553d35;
        font-size: clamp(30px, 7vw, 56px);
        line-height: 1.1;
      }

      img {
        display: block;
        width: min(100%, 560px);
        height: auto;
        margin: 0 auto;
        border-radius: 8px;
        box-shadow: 0 24px 70px rgba(109, 62, 56, .2);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>送你一颗小狗的心</h1>
      <img src="assets/dog-heart.svg" alt="一只正在比心的小狗插画">
    </main>
  </body>
</html>
